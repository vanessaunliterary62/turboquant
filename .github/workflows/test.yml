name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU torch + deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pytest
          pip install -e .

      - name: Verify public import
        run: |
          python -c "from turboquant import TurboQuantCache, TurboQuantConfig; print('import OK')"
          python -c "from turboquant import compression_ratio_fp16, memory_bytes_per_vector; print('utils OK')"

      - name: Run unit tests
        run: pytest src/test_turboquant.py -x --tb=short

      - name: Run CPU demo smoke test
        run: python src/demo.py

      - name: Run reproducibility script
        run: python reports/scripts/run_demo_modes.py

      - name: Assert demo quality thresholds
        run: python reports/scripts/check_thresholds.py
