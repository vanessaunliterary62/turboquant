name: Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
  schedule:
    - cron: "0 8 * * 1"   # Mondays 08:00 UTC — catch external link rot weekly
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --accept 200..=299,429
            --exclude-path vllm_plugin
            --exclude 'localhost'
            --exclude 'cache\.internal'
            --exclude 'doc:'
            './**/*.md'
          fail: true
